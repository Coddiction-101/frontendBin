<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>

    <style>
      table, td, th {
        border: 1px solid #000;
      }

    </style>

  </head>
  <body>
    <table>
      <caption>
        Students Details
      </caption>
      <thead>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>Country</th>
          <th>Batch</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>Aman</td>
          <td>24</td>
          <td>India</td>
          <td rowspan="4">2026</td>
        </tr>
        <tr>
          <td>Max</td>
          <td>25</td>
          <td>USA</td>
        </tr>

        <tr>
          <td>Hina</td>
          <td>26</td>
          <td>Canada</td>
        </tr>

        <tr>
          <td>Mahira</td>
          <td>27</td>
          <td>India</td>
        </tr>
        <tr>
          <td colspan="4">Total Students: 4</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
